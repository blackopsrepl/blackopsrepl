<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1920" height="1080" fill="#000000"/>

  <defs>
    <linearGradient id="terminalGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7effba;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#50fc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38b000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Logo centered -->
  <g transform="translate(960, 420)">
    <!-- Hexagonal outer body -->
    <path d="M0 -140 L106 -70 L126 0 L106 106 L0 154 L-106 106 L-126 0 L-106 -70 Z"
      stroke="url(#terminalGreen)" stroke-width="20" fill="none" stroke-linejoin="miter"/>

    <!-- Angular snake head -->
    <g transform="translate(0, -140)">
      <path d="M0 0 L-18 -24 L-10 -12 L0 -20 L10 -12 L18 -24 Z"
        fill="url(#terminalGreen)" stroke="#000000" stroke-width="2"/>
      <circle cx="-6" cy="-16" r="3" fill="#000000"/>
      <circle cx="6" cy="-16" r="3" fill="#000000"/>
    </g>

    <!-- Tail -->
    <path d="M0 -140 L0 -94" stroke="url(#terminalGreen)" stroke-width="16"/>

    <!-- Inner hexagon -->
    <path d="M0 -70 L56 -36 L66 0 L56 56 L0 84 L-56 56 L-66 0 L-56 -36 Z"
      stroke="#50fc00" stroke-width="3" fill="none" opacity="0.2"/>

    <!-- Center optimization node -->
    <path d="M-36 0 L-14 0 M36 0 L14 0 M0 -36 L0 -14 M0 36 L0 14"
      stroke="#FFFFFF" stroke-width="5" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="12" fill="none" stroke="#FFFFFF" stroke-width="5"/>
    <circle cx="0" cy="0" r="6" fill="#50fc00"/>

    <!-- Corner brackets -->
    <path d="M-22 -22 L-28 -22 L-28 -28 M22 -22 L28 -22 L28 -28 M22 22 L28 22 L28 28 M-22 22 L-28 22 L-28 28"
      stroke="#50fc00" stroke-width="4" stroke-linecap="round"/>
  </g>

  <!-- Text logo -->
  <text x="960" y="720" font-family="system-ui, -apple-system, sans-serif" font-size="120" font-weight="400" letter-spacing="-0.02em" text-anchor="middle">
    <tspan fill="#FFFFFF">Solver</tspan><tspan fill="#50fc00">Forge</tspan>
  </text>
</svg>
