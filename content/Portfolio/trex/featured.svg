<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1920" height="1080" fill="#000000"/>

  <defs>
    <linearGradient id="terminalGreen" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7effba;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#50fc00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38b000;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- TUI Window mockup as logo -->
  <g transform="translate(960, 400)">
    <!-- Window frame -->
    <rect x="-200" y="-140" width="400" height="280" rx="8" fill="#0a0a0a" stroke="#50fc00" stroke-width="3"/>

    <!-- Title bar -->
    <rect x="-200" y="-140" width="400" height="32" rx="8" fill="#111111"/>
    <rect x="-200" y="-116" width="400" height="8" fill="#111111"/>

    <!-- Window buttons -->
    <circle cx="-176" cy="-124" r="6" fill="#ff5f56" opacity="0.8"/>
    <circle cx="-156" cy="-124" r="6" fill="#ffbd2e" opacity="0.8"/>
    <circle cx="-136" cy="-124" r="6" fill="#27ca40" opacity="0.8"/>

    <!-- Title text -->
    <text x="0" y="-118" font-family="monospace" font-size="14" font-weight="400" text-anchor="middle" fill="#50fc00" opacity="0.8">trex</text>

    <!-- Session list -->
    <text x="-180" y="-80" font-family="monospace" font-size="12" fill="#38b000">Sessions</text>

    <!-- Divider -->
    <line x1="-180" y1="-65" x2="180" y2="-65" stroke="#50fc00" stroke-width="1" opacity="0.3"/>

    <!-- Selected session -->
    <rect x="-185" y="-55" width="370" height="28" rx="4" fill="#50fc00" opacity="0.15"/>
    <text x="-170" y="-36" font-family="monospace" font-size="13" fill="#50fc00">▸ project-alpha</text>

    <!-- Other sessions -->
    <text x="-170" y="-4" font-family="monospace" font-size="13" fill="#666666">  dotfiles</text>
    <text x="-170" y="28" font-family="monospace" font-size="13" fill="#666666">  notes</text>

    <!-- Bottom divider -->
    <line x1="-180" y1="55" x2="180" y2="55" stroke="#50fc00" stroke-width="1" opacity="0.3"/>

    <!-- Keybindings -->
    <text x="-170" y="80" font-family="monospace" font-size="10" fill="#444444">j/k</text>
    <text x="-100" y="80" font-family="monospace" font-size="10" fill="#444444">Enter</text>
    <text x="-30" y="80" font-family="monospace" font-size="10" fill="#444444">c</text>
    <text x="20" y="80" font-family="monospace" font-size="10" fill="#444444">d</text>
    <text x="70" y="80" font-family="monospace" font-size="10" fill="#444444">q</text>

    <!-- Filter input -->
    <rect x="-180" y="95" width="360" height="24" rx="4" fill="none" stroke="#38b000" stroke-width="1" opacity="0.4"/>
    <rect x="-170" y="101" width="2" height="12" fill="#50fc00" opacity="0.8"/>
  </g>

  <!-- Text logo -->
  <text x="960" y="780" font-family="system-ui, -apple-system, sans-serif" font-size="110" font-weight="400" letter-spacing="-0.02em" text-anchor="middle" fill="#50fc00">
    trex
  </text>
</svg>
